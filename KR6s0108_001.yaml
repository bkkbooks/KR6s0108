body:
  text: 合員三十帖二十九帖有紫染絹表紙草五帖有外題五帖無外題一帖無表紙新譯花嚴經一部四帖每帖復各十卷但第四帖末有南天竺王進梵本經願文右四帖第一第二第三第四仁王般若陀羅尼釋一卷不空譯金剛頂降三世大儀軌法教中觀自在菩薩心真言一切如來蓮花大曼荼羅品一卷不空譯瑜伽蓮花部念誦法一卷不空譯一字頂輪王念誦法一卷不空譯金剛峯樓閣一切瑜伽瑜祇經一卷金剛智譯一字頂輪王瑜伽一卷不空譯後題云一字頂輪王瑜伽究竟儀軌一卷右一帖第五帙新譯仁王經二卷不空譯一字奇特佛頂經三卷不空譯觀自在明王經一卷不空譯觀自在授記經一卷不空譯後題云觀自在多羅菩薩儀軌經尊勝儀軌一卷不空譯阿閦念誦法一卷不空譯一髻尊陀羅尼經一卷不空譯右一帖第六帙六波羅蜜經一部復十卷右一部一帖第七帙守護國界經一部復十卷右一部一帖第八帙菩提場一字頂輪王經一部五卷不空譯端有灑淨等胎藏界諸尊真言菩薩護摩真言金剛歌讚等大聖歡喜天經一卷不空譯末有十八道頸次第右一帖第九帙金剛頂略出經一部復四卷右一部一帖第十帙金剛頂真實大教王經一部復三卷不空譯右一部一帖第十一帙新譯密嚴經一部復三卷不空譯右一部一帖第十二帙十一面儀軌經一部復三卷右一部一帖第十三帙不空羂索經二卷第六第草末有諸經儀軌等策子目録右二卷一帖第十四帙雨寶陀羅尼經一卷文殊問經字母品一卷不空譯虛空藏菩薩念誦法一卷不空譯速疾立驗摩醯首羅天説迦樓羅阿尾奢法一卷不空譯地藏菩薩請問法身讚一卷不空譯孔雀經一卷下卷理趣釋經一卷不空譯用珠差別偈一卷右一帖第十五帙末利支提婆華鬘經一卷不空譯葉衣觀自在菩薩經一卷不空譯訶利帝母經一卷不空譯觀自在説普賢陀羅尼經一卷不空譯王法正論經一卷不空譯普賢金剛薩埵瑜伽念誦儀軌一卷不空譯金剛頂經瑜伽文殊師利菩薩法品一卷不空譯右一帖第十六帙造塔延命功德經一卷般若三藏譯金剛頂瑜伽念珠經一卷注云於十萬廣頌中略出云云不空譯三十五佛名禮懺文注云出烏波離所問經云云不空譯木槵經一卷不空譯金剛頂經觀自在王修行法一卷末有施不動尊殘食真言菩薩消息金輪王佛頂要略念誦法一卷注云通頂諸佛不空譯大毗盧遮那成佛神變加持經毗示七支念誦隨行法一卷不空譯毗沙門天王經一卷不空譯右一帖第十七帙成就妙法蓮花經王瑜伽觀智儀禮軌一卷不空譯有梵字菩提場莊嚴陀羅尼經一卷不空譯寶篋經一卷不空譯右一帖第十八帙大藥叉母歡喜母并愛子成就法注云亦名訶利帝母法不空譯金剛頂瑜伽他化自在天理趣會普賢修行念誦儀軌不空譯金剛壽命陀羅尼念誦法金剛智與不空譯不空羂索毗盧遮那佛大灌頂光明真言一卷注云出不空羂索經二十八卷有梵字不空譯發菩提心論一卷不空譯大樂金剛薩埵修行成就儀軌一卷注云出吉祥勝初教王瑜伽經不空譯右一帖第十九帙金剛頂瑜伽經十八會指歸一卷不空譯三十七尊禮懺一卷不空譯十七尊釋一卷不空譯陀羅尼門諸部要目一卷大聖文殊師利菩薩讚佛法身禮注云此禮出大乘一切佛境界智光明莊嚴經不空譯發菩提心儀一卷授發菩提心戒文一卷一百八尊法身契印一卷無畏一行譯末有毗盧遮那悉地流出相應句陀羅尼右一帖第二十帙仁王經念誦法一卷內有段段廣於恆例本金剛頂瑜伽金剛薩埵五祕密修行儀軌一卷不動尊使者祕密法一卷題下注云一名難勝奮怒王真言金剛頂經瑜伽修習毗盧遮那三摩地法金剛智譯右一帖第二十一帙文殊師利根本大教王金翅鳥王品一卷摩訶吠室羅末那野提婆喝羅闍陀羅尼儀軌一卷般若斫揭羅譯華嚴經心陀羅尼一卷末云上元縣高公寺摩訶衍和尚授右一帖第二十二帙注尊勝陀羅尼一卷此策子初有􅚤等六行梵真言後勘可知又尊勝真言初有爾時世尊知帝釋意心之所念等一行餘長行與恆例本少異金剛手光明灌頂經最勝立印聖無動尊大威怒王念誦儀軌法品一卷不空遍知譯右一帖第二十三帙金剛頂經大瑜伽祕密心地法門義訣卷上一卷右一帖第二十四帙聖迦抳忿怒金剛童子菩提成就儀軌經大乘緣生論一卷聖者鬱楞迦造不空譯以朱科段也伽馱金剛真言一本施諸餓鬼飲食及文殊菩薩獻佛陀羅尼一卷次訶釐底母梵字真言次梵字愛子真言并消息等有之次施四天王食梵字真言并消息有之次施不動尊梵字真言并消息之次梵字漢注八曼陀羅經次文殊師利根本大教王金翅鳥品一卷有第二十二帙中疑前本歟次聖閻曼德迦威怒王立成大神驗念誦法一卷有梵字次有菩薩結夏頌并自恣頌但自恣頌與恆例異是菩提自恣頌歟大威德忿怒王根本真言以墨斷句次記世界有同類異類之由偈在之次花嚴和尚講前回向文願此音聲對物變改等等等右一帖無外題并帙名聖迦抳忿怒金剛童子菩提成就儀軌經一卷有點金剛童子念誦儀軌經一卷右一帖無外題并帙名如意輪菩薩觀門義注祕訣一卷有梵字瑜伽金剛頂經釋字母品一卷有梵字大方廣佛花嚴經入法界品四十二字觀門一卷有梵字大方廣佛花嚴經入法界品頓證毗盧遮那法身字輪瑜伽儀軌一卷陀羅尼諸部要目一卷內有三部小呪梵字私云與前同歟授發菩薩戒文一卷有梵字私云與前同歟般若波羅蜜多理趣經大安樂不空真實金剛菩薩一十七聖大曼荼羅義述一卷私云是與前本同歟金剛頂瑜伽經十八會指歸一卷不空譯私云與前同歟金剛頂經金剛界大道場毗盧遮那如來自授用身內證智眷屬法身異名佛最上乘祕密三摩地禮懺文一卷不空譯私云與前同歟但末不足右一帖無外題并帙名但表紙裏有件一帖內目録文殊問經字母品第十四卷有梵字瑜伽金剛頂經釋字母品一卷有梵字大方廣佛花嚴經入法界品四十二字觀門一卷有梵字私云與前同本歟大方廣佛花嚴經入法界品四十二字觀門一卷私云與前本同歟但以有梵字字輪可為異釋陀羅尼文字觀行品法一卷有朱點後題云仁王般若波羅密多釋真言轉法輪菩薩摧魔怨敵法一卷右一帖無外題并帙名梵字世尊聖者千眼千首千舌千臂觀自在菩薩怛縛廣大圓滿無礙大悲心陀羅尼一本梵字大金剛輪真言一本梵字不動慈救明一本梵字十八道真言等梵字虛空藏轉明記梵字如意輪讚梵字如意輪真言梵字甘露軍吒利真言梵字六足尊身真言梵字金剛摧碎真言梵字持世真言次有梵字大真言等等等若隨求歟可知勘之梵字五股真言梵字鈴真言梵字三鈷真言梵字獨鈷真言梵字金剛部羯磨真言梵字寶部羯磨真言梵字蓮花部羯磨真言梵字羯磨部羯磨真言梵字小金剛輪真言次有梵字真言等云云勘可知之梵字菩薩莊嚴真言同心真言同隨心真言下有功能義梵字金剛解脫真言次有梵字真言勘可知之佛説出生無邊門陀羅尼儀軌不空譯梵字理趣道場十六菩薩三磨耶梵字一字頂輪儀軌漢語吉慶讚蛇蝎等噬真言斷蚊子真言焚香散花香水等偈大方廣菩薩藏經中文殊師利根本一字陀羅尼法一卷末云長安三年正月二十三日北天竺國三藏僧阿儞真那宣譯梵本婆羅門大首領臣李無諂譯語僧尸利秣哆證譯滅惡趣真言一通私云例少異破地獄真言一通右一帖外題云梵字真言云云然而多有漢語等已上二十九帖皆有紫色表紙普賢金剛薩埵瑜伽念誦儀軌一卷不空譯右一帖破無表紙又初可有文殊儀軌然而皆破失只有後題延喜十八年二月二十七日左辨官下東寺應真言根本阿闍梨贈大僧正空海入唐求得法文册子三十帖安置經藏事右右大臣宣奉敕件法文宜全收經藏不出國外令宗長者永代守護者寺宜承知依宣行之不得疏略延喜十九年十一月二日大史菅野朝臣清方大辨橘朝臣澄清請收大和尚御策子事合三十帖之中二十九帖有黑紫絹表紙一帖無表紙貞觀十八年六月六日權律師真然請供策子孔雀經等合八種儀軌作紙惠宿返上已了收真然延喜十九年十一月二日從內裏被給納件策子草莒一合有錦縫立褐袋又有左辨官下東寺敕書一枚天明二年七月二十四日以法鼓臺本令書寫了禪證
